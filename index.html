<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pickbank">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/jpeg" href="./icons/pickbanklogo.jpg">
  <link rel="apple-touch-icon" href="./icons/pickbanklogo.jpg">
  <title>Pickbank PWA</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-theme="warm">
  <div id="splashScreen" class="splash-screen" aria-hidden="true">
    <div class="splash-media">
      <img class="splash-image" src="./icons/pickbanklogo.jpg" alt="">
      <h1 class="splash-name" id="text-name">Pickbank</h1>
      <p class="splash-slogan" id="text-slogan">从容，来源于纯净。</p>
    </div>
  </div>

  <div id="app" class="app-shell">
    <header class="app-header">
      <div>
        <h1 id="appTitle">Pickbank</h1>
        <div class="title-sub" id="titleSub"></div>
      </div>
      <div class="header-actions" id="headerActions"></div>
    </header>

    <main class="app-main">
      <section id="homeScreen" class="screen"></section>
      <section id="summaryScreen" class="screen hidden"></section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-tab="home" id="navHome">记录</button>
      <button class="nav-btn" data-tab="summary" id="navSummary">总结</button>
    </nav>
  </div>

  <div id="installHint" class="install-hint hidden"></div>
  <div id="toast" class="toast hidden"></div>

  <div id="overlay" class="overlay hidden"></div>
  <div id="onboardingLayer" class="onboarding-layer hidden"></div>

  <div id="manualModal" class="modal hidden"></div>
  <div id="budgetModal" class="modal hidden"></div>
  <div id="aiModal" class="modal hidden"></div>
  <div id="dayDetailModal" class="modal hidden"></div>

  <script src="./app.js"></script>
</body>
</html>
